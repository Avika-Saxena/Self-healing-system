apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-deployment-frontend
  namespace: self-healing-system-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: self-healing-system-frontend
        image: avikasaxenapvt/self-healing-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1