apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-deployment
  namespace: self-healing-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: self-healing-app
  template:
    metadata:
      labels:
        app: self-healing-app
    spec:
      containers:
      - name: self-healing-container
        image: self-healing-image:latest
        ports:
        - containerPort: 3000