name: Automate deployment to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  # test: // will add beta/gama/alpha testing in future
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code # pull latest updates from the repo
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t avikasaxenapvt/self-healing-system-backend:latest ./backend

      - name: Push Backend
        run: |
          docker push avikasaxenapvt/self-healing-system-backend:latest
      
      - name: Build Frontend
        run: |
          docker build -t avikasaxenapvt/self-healing-system-frontend:latest ./frontend

      - name: Push Frontend
        run: |
          docker push avikasaxenapvt/self-healing-system-frontend:latest

