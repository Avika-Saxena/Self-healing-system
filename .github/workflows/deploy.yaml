name: Automate deployment to Kubernetes

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  BACKEND_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/self-healing-backend
  FRONTEND_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/self-healing-frontend
  NAMESPACE: self-healing-system-namespace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted

    outputs:
      uniquetag: ${{ steps.set_tag.outputs.uniquetag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Unique Image Name
        id: set_tag
        run: |
          TAG="$(git rev-parse --short HEAD 2>/dev/null || echo 'build')-$(date +'%H%M%S')"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "uniquetag=$TAG" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Start Docker build
        run: |
          docker build -t ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.set_tag.outputs.uniquetag }} ./backend
          docker build -t ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.set_tag.outputs.uniquetag }} ./frontend

      - name: Push Docker image
        run: |
          docker push ${{ env.BACKEND_IMAGE_NAME }}:${{ steps.set_tag.outputs.uniquetag }}
          docker push ${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.set_tag.outputs.uniquetag }}

  load-image:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check and Manage Minikube
        run: |
          if ! command -v minikube &> /dev/null; then
            echo "Minikube is not installed. Installing now..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
            echo "Minikube is installed, starting the service...."
            minikube start
          else
            echo "Minikube is already installed. Checking status..."
            if ! minikube status &> /dev/null; then
              echo "Minikube is not running — start it before this job can proceed"
              minikube start
            fi
            echo "Minikube is up and running!"
          fi

      - name: Enable required add-ons
        run: |
          minikube addons enable ingress
          minikube addons enable metrics-server
  
      - name: Load image into Minikube
        run: |
          minikube image load ${{ env.BACKEND_IMAGE_NAME }}:${{ needs.build-and-push.outputs.uniquetag }}
          minikube image load ${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.build-and-push.outputs.uniquetag }}

      - name: Check and Manage Kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            echo "Kubectl is not installed. Installing now..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
            rm kubectl
          else
            echo "Kubectl is already installed!"
          fi

      - name: Update Kubernetes Deployment
        run: |
          kubectl set image deployment/self-healing-deployment-backend self-healing-system-backend=${{ env.BACKEND_IMAGE_NAME }}:${{ needs.build-and-push.outputs.uniquetag }} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/self-healing-deployment-frontend self-healing-system-frontend=${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.build-and-push.outputs.uniquetag }} -n ${{ env.NAMESPACE }}

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/self-healing-deployment-backend -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/self-healing-deployment-frontend -n ${{ env.NAMESPACE }}
