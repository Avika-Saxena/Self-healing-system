name: Setup Minikube and Docker

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: self-hosted

    steps:

      - name: check docker availability on system
        run: |
          if ! command -v docker &> /dev/null; then
            echo "Docker is not installed. Installing now..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh
            rm get-docker.sh
          else
            echo "Docker is already installed!"
          fi

      - name: check Minikube availability on system
        run: |
          if ! command -v minikube &> /dev/null; then
            echo "Minikube is not installed. Installing now..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
            minikube delete --all --purge
            minikube start --memory=2560mb --cpus=2
          else
            echo "Minikube is already installed!"
            if ! minikube status &> /dev/null; then
              echo "Minikube is not running — start it before this job can proceed"
              minikube delete --all --purge
              minikube start --memory=2560mb --cpus=2
            fi
          fi
      - name: Enable required add-ons
        run: |
          minikube addons enable ingress
          minikube addons enable metrics-server

      - name: check Kubectl availability on system
        run: |
          if ! command -v kubectl &> /dev/null; then
            echo "Kubectl is not installed. Installing now..."
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
            rm kubectl
          else
            echo "Kubectl is already installed!"
          fi
