name: self-healing-system

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    image: avikasaxenapvt/self-healing-backend:latest
    ports:
      - "3000:3000"
    networks:
      - self-healing-system-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    image: avikasaxenapvt/self-healing-frontend:latest
    ports:
      - "5000:80"
    networks:
      - self-healing-system-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  self-healing-system-network:
    driver: bridge